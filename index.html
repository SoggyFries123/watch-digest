<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Wind — Daily Watch Digest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --dial-black:#12130f;
    --dial-panel:#1a1c17;
    --lume:#c9d16a;
    --lume-dim:#8b9450;
    --steel:#9aa39a;
    --paper:#e9e6da;
    --hairline:#33362c;
    --red-seconds:#b5493a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--dial-black);
    color:var(--paper);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    letter-spacing:0.01em;
  }
  header{
    padding:48px 24px 28px;
    text-align:center;
    border-bottom:1px solid var(--hairline);
  }
  header .mark{
    font-size:11px;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--lume-dim);
    margin-bottom:10px;
  }
  header h1{
    font-weight:600;
    font-size:clamp(28px,5vw,44px);
    margin:0 0 8px;
    color:var(--paper);
  }
  header p{
    margin:0;
    color:var(--steel);
    font-size:13px;
  }
  #meta{
    text-align:center;
    padding:14px 24px;
    font-size:12px;
    color:var(--lume-dim);
    border-bottom:1px solid var(--hairline);
  }
  #controls{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:16px;
    flex-wrap:wrap;
    border-bottom:1px solid var(--hairline);
  }
  button.refresh{
    background:transparent;
    border:1px solid var(--lume-dim);
    color:var(--lume);
    font-family:inherit;
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:10px 18px;
    cursor:pointer;
    transition:all .15s ease;
  }
  button.refresh:hover{ background:var(--lume-dim); color:var(--dial-black); }
  button.refresh:focus-visible{ outline:2px solid var(--lume); outline-offset:2px; }

  /* Per-source status strip */
  #source-status{
    display:flex;
    flex-wrap:wrap;
    gap:8px 10px;
    justify-content:center;
    padding:14px 20px;
    font-size:11px;
    border-bottom:1px solid var(--hairline);
  }
  .status-chip{
    color:var(--steel);
    cursor:pointer;
    padding:5px 10px;
    border-radius:999px;
    border:1px solid transparent;
    transition:opacity .15s ease, border-color .15s ease, background .15s ease;
    user-select:none;
  }
  .status-chip:hover{ border-color:var(--hairline); }
  .status-chip:focus-visible{ outline:2px solid var(--lume); outline-offset:1px; }
  .status-chip .n{ color:var(--paper); font-weight:600; }
  .status-chip.ok .n{ color:var(--lume); }
  .status-chip.err{ color:var(--red-seconds); }
  .status-chip.active{
    border-color:var(--lume-dim);
    background:rgba(201,209,106,0.12);
  }
  .status-chip.active .n{ color:var(--lume); }
  .status-chip.all{ font-weight:600; }
  #source-status.filtering .status-chip:not(.active){ opacity:0.4; }

  main{
    max-width:1040px;
    margin:0 auto;
    padding:24px 20px 40px;
  }
  #feed{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:22px 18px;
  }
  .card{ display:block; }
  .card a{
    color:var(--paper);
    text-decoration:none;
    display:block;
  }
  .card a:hover .card-title{ color:var(--lume); }
  .item-thumb{
    display:block;
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    border-radius:4px;
    margin-bottom:8px;
    background:var(--dial-panel);
  }
  .item-thumb.placeholder{
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--hairline);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
  }
  .card-title{
    font-size:14.5px;
    line-height:1.4;
    display:block;
  }
  .card-meta{
    display:flex;
    justify-content:space-between;
    gap:8px;
    margin-top:6px;
    font-size:11px;
    color:var(--lume-dim);
    letter-spacing:0.03em;
  }
  .card-source{
    color:var(--steel);
    text-transform:uppercase;
    letter-spacing:0.06em;
    font-size:10px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  #sentinel{
    height:1px;
  }
  #scroll-status{
    text-align:center;
    padding:30px 20px;
    font-size:12px;
    color:var(--steel);
  }
  #scroll-status.loading::after{
    content:'';
    display:inline-block;
    width:6px; height:6px;
    background:var(--lume);
    border-radius:50%;
    margin-left:8px;
    animation:tick 1s steps(1) infinite;
  }
  @keyframes tick{ 50%{ opacity:0.15; } }

  footer{
    text-align:center;
    padding:30px 20px 60px;
    font-size:11px;
    color:var(--hairline);
  }

  @media (prefers-reduced-motion: reduce){
    #scroll-status.loading::after{ animation:none; }
  }

  /* Floating actions — clock & refresh always available; back-to-top appears once scrolled */
  #floating-actions{
    position:fixed;
    bottom:22px;
    right:22px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:50;
  }
  #fab-top{
    opacity:0;
    transform:translateY(8px);
    pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
  }
  #fab-top.visible{
    opacity:0.8;
    transform:translateY(0);
    pointer-events:auto;
  }
  #fab-top.visible:hover{ opacity:1; }
  .fab{
    width:46px; height:46px;
    border-radius:50%;
    border:1px solid var(--lume-dim);
    background:var(--dial-black);
    color:var(--lume);
    font-size:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,0.4);
    opacity:0.8;
    transition:background .15s ease, color .15s ease, opacity .15s ease;
  }
  .fab:hover{ background:var(--lume-dim); color:var(--dial-black); opacity:1; }
  .fab:focus-visible{ outline:2px solid var(--lume); outline-offset:2px; }
  .fab.spinning{ animation:spin 0.6s linear; }
  @keyframes spin{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }

  /* Clock overlay */
  #clock-overlay{
    position:fixed;
    inset:0;
    z-index:100;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    visibility:hidden;
    transition:opacity .2s ease;
  }
  #clock-overlay.open{ opacity:1; visibility:visible; }
  .clock-backdrop{
    position:absolute; inset:0;
    background:rgba(0,0,0,0.65);
  }
  .clock-card{
    position:relative;
    width:300px; height:300px;
    border-radius:50%;
    background:radial-gradient(circle at 32% 28%, #2a2f52 0%, #171b34 45%, #0d0f22 100%);
    box-shadow:0 30px 60px -20px rgba(0,0,0,.5), inset 0 0 0 2px rgba(255,255,255,.06);
  }
  .clock-close{
    position:absolute;
    top:-14px; right:-14px;
    width:32px; height:32px;
    border-radius:50%;
    border:1px solid #3a3f5c;
    background:#0d0f22;
    color:#e9e7e0;
    font-size:14px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .clock-close:hover{ background:#2a2f52; }
  .clock-readout{
    position:absolute;
    left:50%; top:78%;
    transform:translate(-50%,-50%);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    pointer-events:none;
    font-family:'Inter', -apple-system, system-ui, sans-serif;
  }
  .clock-time{ color:#c9a35c; font:600 13px 'Inter',sans-serif; letter-spacing:0.5px; }
  .clock-date{ color:#e9e7e0; font:600 9px 'Inter',sans-serif; letter-spacing:0.6px; opacity:0.85; }
  .clock-tz{ color:#8a91b0; font:500 8px 'Inter',sans-serif; letter-spacing:0.5px; opacity:0.8; }
  .clock-moon{ color:#c9a35c; font:500 8px 'Inter',sans-serif; letter-spacing:0.5px; opacity:0.9; }
</style>
</head>
<body>

<header>
  <div class="mark">Daily Wind · Watch Press</div>
  <h1>The Wind</h1>
  <p>Everything recent, across the watch press — scroll for more.</p>
</header>

<div id="meta">Loading…</div>
<div id="source-status"></div>

<div id="controls">
  <button class="refresh" onclick="loadAll()">Re-run digest</button>
</div>

<main>
  <div id="feed"></div>
  <div id="sentinel"></div>
  <div id="scroll-status"></div>
</main>

<footer>
  Pulled live via feed proxy. Some sources may fail to load — that's the source or proxy, not this page.<br>
  Built for a daily 8am read.
</footer>

<div id="floating-actions">
  <button class="fab" id="fab-refresh" title="Re-run digest" aria-label="Re-run digest" onclick="handleFabRefresh()">↻</button>
  <button class="fab" id="fab-clock" title="Show clock" aria-label="Show clock" onclick="openClockOverlay()">🕐</button>
  <button class="fab" id="fab-top" title="Back to top" aria-label="Back to top" onclick="scrollToTop()">↑</button>
</div>

<div id="clock-overlay">
  <div class="clock-backdrop" onclick="closeClockOverlay()"></div>

<script>
const RSS_SOURCES = [
  { name: "A Timely Perspective", url: "https://atimelyperspective.com/feed/" },
  { name: "Deployant",            url: "https://deployant.com/feed/" },
  { name: "Fratello Watches",     url: "https://www.fratellowatches.com/feed/" },
  { name: "Monochrome Watches",   url: "https://monochrome-watches.com/blog/feed/" },
  { name: "Worn & Wound",         url: "https://www.wornandwound.com/feed" },
  { name: "Quill & Pad",          url: "https://quillandpad.com/feed/" },
  { name: "Revolution",           url: "https://revolutionwatch.com/feed/" },
  { name: "Time and Watches",     url: "https://www.timeandwatches.com/feeds/posts/default?alt=rss" },
  { name: "Time+Tide Watches",    url: "https://timeandtidewatches.com/feed/" }
];

const BATCH_SIZE = 12;

let allItems = [];      // full pool, fetched once per load
let revealedCount = 0;  // how many are currently rendered within the active pool
let activeFilter = null; // source name, or null for "all"
let observer = null;

function currentPool(){
  return activeFilter ? allItems.filter(it => it.source === activeFilter) : allItems;
}

function applyChipStates(){
  const strip = document.getElementById('source-status');
  strip.classList.toggle('filtering', !!activeFilter);
  strip.querySelectorAll('.status-chip').forEach(chip => {
    const name = chip.dataset.source;
    chip.classList.toggle('active', name === 'ALL' ? !activeFilter : activeFilter === name);
  });
}

function setFilter(name){
  activeFilter = (name === null) ? null : (activeFilter === name ? null : name);
  revealedCount = 0;
  document.getElementById('feed').innerHTML = '';
  applyChipStates();
  revealNextBatch();
  setupInfiniteScroll();
}

function fmtDate(d){
  if (!d) return 'Recent';
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' }) +
         ' · ' + d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
}

function extractImage(item){
  if (item.thumbnail && item.thumbnail.trim()) return item.thumbnail;
  if (item.enclosure && item.enclosure.link && /image/i.test(item.enclosure.type || '')) {
    return item.enclosure.link;
  }
  const html = item.content || item.description || '';
  const match = html.match(/<img[^>]+src=["']([^"']+)["']/i);
  return match ? match[1] : null;
}

function updateStatusChip(name, label, cls){
  let chip = document.getElementById('chip-' + name);
  if (!chip) return;
  chip.textContent = '';
  const nameSpan = document.createElement('span');
  nameSpan.className = 'n';
  nameSpan.textContent = name + ' ';
  chip.appendChild(nameSpan);
  chip.appendChild(document.createTextNode(label));
  chip.className = 'status-chip ' + cls;
}

async function loadRSSSource(source){
  updateStatusChip(source.name, '· loading', '');
  try {
    const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(source.url)}`;
    const res = await fetch(apiUrl);
    if (!res.ok) throw new Error('bad response');
    const data = await res.json();
    if (data.status !== 'ok') throw new Error('feed error');

    const items = data.items.map(it => ({
      title: it.title,
      link: it.link,
      date: it.pubDate ? new Date(it.pubDate.replace(' ', 'T')) : null,
      image: extractImage(it),
      source: source.name
    }));

    updateStatusChip(source.name, `· ${items.length}`, 'ok');
    return items;
  } catch (e){
    updateStatusChip(source.name, '· failed', 'err');
    return [];
  }
}

function renderCard(item){
  const card = document.createElement('div');
  card.className = 'card';
  const thumbHtml = item.image
    ? `<img class="item-thumb" src="${item.image}" alt="" loading="lazy" onerror="this.remove()">`
    : `<div class="item-thumb placeholder">No image</div>`;
  card.innerHTML = `
    <a href="${item.link}" target="_blank" rel="noopener">
      ${thumbHtml}
      <span class="card-title">${item.title}</span>
      <span class="card-meta">
        <span class="card-source">${item.source}</span>
        <span>${fmtDate(item.date)}</span>
      </span>
    </a>`;
  return card;
}

function revealNextBatch(){
  const feed = document.getElementById('feed');
  const statusEl = document.getElementById('scroll-status');
  const pool = currentPool();
  const next = pool.slice(revealedCount, revealedCount + BATCH_SIZE);

  if (next.length === 0){
    statusEl.className = '';
    statusEl.textContent = pool.length === 0
      ? 'No articles from this source right now.'
      : "You're caught up. That's everything the feeds have right now.";
    if (observer) observer.disconnect();
    return;
  }

  next.forEach(item => feed.appendChild(renderCard(item)));
  revealedCount += next.length;

  if (revealedCount >= pool.length){
    statusEl.className = '';
    statusEl.textContent = "You're caught up. That's everything the feeds have right now.";
    if (observer) observer.disconnect();
  } else {
    statusEl.className = '';
    statusEl.textContent = '';
  }
}

function setupInfiniteScroll(){
  const sentinel = document.getElementById('sentinel');
  const statusEl = document.getElementById('scroll-status');
  if (observer) observer.disconnect();

  observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && revealedCount < currentPool().length){
        statusEl.className = 'loading';
        statusEl.textContent = 'Loading more';
        setTimeout(revealNextBatch, 250); // small delay so the loading state is visible
      }
    });
  }, { rootMargin: '400px' });

  observer.observe(sentinel);
}

async function loadAll(){
  const feed = document.getElementById('feed');
  const meta = document.getElementById('meta');
  const statusStrip = document.getElementById('source-status');
  const statusEl = document.getElementById('scroll-status');

  feed.innerHTML = '';
  statusEl.textContent = '';
  meta.textContent = 'Refreshing…';
  allItems = [];
  revealedCount = 0;
  activeFilter = null;

  const allSourceNames = RSS_SOURCES.map(s => s.name);
  const chipAttrs = `tabindex="0" role="button" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}"`;
  statusStrip.innerHTML =
    `<span class="status-chip all active" data-source="ALL" ${chipAttrs} onclick="setFilter(null)">All sources</span>` +
    allSourceNames
      .map(name => `<span class="status-chip" id="chip-${name}" data-source="${name}" ${chipAttrs} onclick="setFilter('${name.replace(/'/g, "\\'")}')">${name}</span>`)
      .join('');

  const jobs = RSS_SOURCES.map(s => loadRSSSource(s));

  const results = await Promise.allSettled(jobs);
  let merged = [];
  results.forEach(r => {
    if (r.status === 'fulfilled') merged = merged.concat(r.value);
  });

  // newest first — every remaining source is a dated RSS feed now that Hodinkee (undated) is gone
  allItems = merged.filter(it => it.date).sort((a,b) => b.date - a.date);

  meta.textContent = `Last run: ${new Date().toLocaleString('en-US', { dateStyle:'medium', timeStyle:'short' })} · ${allItems.length} articles loaded`;

  revealNextBatch();
  setupInfiniteScroll();
}

function scrollToTop(){
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function handleFabRefresh(){
  const btn = document.getElementById('fab-refresh');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 600);
  loadAll();
  scrollToTop();
}

window.addEventListener('scroll', () => {
  const topBtn = document.getElementById('fab-top');
  topBtn.classList.toggle('visible', window.scrollY > 400);
});

// ===== Clock overlay — ported from the Claude Design export =====
let clockTimer = null;
let clockStars = null;

function seededStars(n, seedA, seedB){
  const out = [];
  let s = seedA * 9301 + seedB * 49297;
  const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  for (let i = 0; i < n; i++){
    out.push({ x: rnd()*190+5, y: rnd()*190+5, r: rnd()*0.9+0.2, o: rnd()*0.6+0.25 });
  }
  return out;
}

function moonPhase(date){
  const synodic = 2551443;
  const knownNewMoon = Date.UTC(1970,0,7,20,35,0) / 1000;
  let phase = ((date.getTime()/1000) - knownNewMoon) % synodic;
  if (phase < 0) phase += synodic;
  return phase / synodic;
}

function moonPath(phase, r){
  const n = 40;
  const rightLit = phase < 0.5;
  const crescent = phase < 0.25 || phase > 0.75;
  const theta = 2 * Math.PI * phase;
  const rx = Math.abs(Math.cos(theta)) * r;
  const pts = [];
  for (let i = 0; i <= n; i++){
    const y = -r + (2*r*i/n);
    const xo = Math.sqrt(Math.max(0, r*r - y*y));
    const xt = (rx/r) * xo;
    const x = rightLit ? xo : (crescent ? -xt : xt);
    pts.push([x,y]);
  }
  for (let i = 0; i <= n; i++){
    const y = r - (2*r*i/n);
    const xo = Math.sqrt(Math.max(0, r*r - y*y));
    const xt = (rx/r) * xo;
    const x = rightLit ? (crescent ? xt : -xt) : -xo;
    pts.push([x,y]);
  }
  return 'M ' + pts.map(p => p[0].toFixed(2)+' '+p[1].toFixed(2)).join(' L ') + ' Z';
}

function buildTicksSVG(){
  const group = document.getElementById('ticksGroup');
  group.innerHTML = '';
  for (let i = 0; i < 60; i++){
    const isHour = i % 5 === 0;
    const ang = (i/60) * 2 * Math.PI;
    const rOuter = 92, rInner = isHour ? 78 : 87;
    const x1 = 100 + rOuter*Math.sin(ang), y1 = 100 - rOuter*Math.cos(ang);
    const x2 = 100 + rInner*Math.sin(ang), y2 = 100 - rInner*Math.cos(ang);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#e8e6df');
    line.setAttribute('stroke-width', isHour ? 2 : 0.7);
    line.setAttribute('opacity', '0.75');
    group.appendChild(line);
  }
}

function buildStarsSVG(){
  if (!clockStars) clockStars = seededStars(60, 17, 40);
  const group = document.getElementById('starsGroup');
  group.innerHTML = '';
  clockStars.forEach(st => {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', st.x); c.setAttribute('cy', st.y); c.setAttribute('r', st.r);
    c.setAttribute('fill', '#fff'); c.setAttribute('opacity', st.o);
    group.appendChild(c);
  });
}

function getLocalParts(date){
  // No timeZone specified — Intl defaults to the system's local time zone,
  // whatever that is for whoever has this page open.
  const parts = new Intl.DateTimeFormat('en-GB', {
    hour12: false, weekday: 'short',
    year: 'numeric', month: 'short', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit', timeZoneName: 'shortOffset'
  }).formatToParts(date);
  const get = t => parts.find(p => p.type === t)?.value;
  return {
    weekday: get('weekday').toUpperCase(),
    day: parseInt(get('day'), 10),
    month: get('month').toUpperCase(),
    year: get('year'),
    hour: parseInt(get('hour'), 10),
    minute: parseInt(get('minute'), 10),
    second: parseInt(get('second'), 10),
    gmt: get('timeZoneName')
  };
}

function moonPhaseName(phase){
  const names = [
    'New Moon', 'Waxing Crescent', 'First Quarter', 'Waxing Gibbous',
    'Full Moon', 'Waning Gibbous', 'Last Quarter', 'Waning Crescent'
  ];
  const idx = Math.floor(((phase + 0.0625) % 1) * 8);
  return names[idx];
}

function renderClock(){
  const now = new Date();
  const local = getLocalParts(now);
  const h = local.hour % 12, m = local.minute, s = local.second;
  const hourAngle = h*30 + m*0.5 + s*(0.5/60);
  const minuteAngle = m*6 + s*0.1;
  const secondAngle = s*6;

  document.getElementById('hourHandG').setAttribute('transform', `rotate(${hourAngle} 100 100)`);
  document.getElementById('minuteHandG').setAttribute('transform', `rotate(${minuteAngle} 100 100)`);
  document.getElementById('secondHandG').setAttribute('transform', `rotate(${secondAngle} 100 100)`);

  const phase = moonPhase(now);
  const d = moonPath(phase, 13);
  document.getElementById('moonPath').setAttribute('d', d);
  document.getElementById('moonClipPath').setAttribute('d', d);

  const h12 = h === 0 ? 12 : h;
  document.getElementById('clockDigital').textContent =
    `${h12}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${local.hour < 12 ? 'AM' : 'PM'}`;
  document.getElementById('clockDate').textContent =
    `${local.weekday} ${local.day} ${local.month} ${local.year}`;
  document.getElementById('clockTz').textContent = `Local time · ${local.gmt}`;
  document.getElementById('clockMoon').textContent = moonPhaseName(phase);
}

function openClockOverlay(){
  buildTicksSVG();
  buildStarsSVG();
  renderClock();
  document.getElementById('clock-overlay').classList.add('open');
  if (clockTimer) clearInterval(clockTimer);
  clockTimer = setInterval(renderClock, 1000);
}

function closeClockOverlay(){
  document.getElementById('clock-overlay').classList.remove('open');
  if (clockTimer){ clearInterval(clockTimer); clockTimer = null; }
}

loadAll();
</script>
